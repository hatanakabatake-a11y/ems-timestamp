<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>救急現場タイムスタンプ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    h2 {
      font-size: 18px;
      margin: 20px 0 8px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      font-size: 18px;
      font-weight: 600;
      padding: 14px 10px;
      border: none;
      border-radius: 10px;
      background: #1976d2;
      color: white;
      min-height: 56px;
    }

    button:active {
      opacity: 0.75;
      transform: scale(0.98);
    }

    button.green {
      background: #388e3c;
    }

    button.blue {
      background: #1976d2;
    }

    button.purple {
      background: #7b1fa2;
    }

    button.red {
      background: #d32f2f;
    }

    button.gray {
      background: #666;
    }

    .log {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .log-item {
      border-bottom: 1px solid #ddd;
      padding: 8px 0;
      font-size: 15px;
    }

    .log-item:last-child {
      border-bottom: none;
    }

    .time {
      font-weight: bold;
      margin-right: 8px;
      display: inline-block;
      min-width: 150px;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 80px;
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: -4px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <h1>救急現場タイムスタンプ</h1>
  <p class="small">ボタンを押した時点の時刻を記録します。</p>

  <div class="buttons">
    <button class="green" onclick="addStamp('接触')">接触</button>
    <button class="green" onclick="addStamp('初期波形')">初期波形</button>

    <button class="blue" onclick="addStamp('1ピリオド')">1ピリオド</button>
    <button class="blue" onclick="addStamp('2ピリオド')">2ピリオド</button>
    <button class="blue" onclick="addStamp('3ピリオド')">3ピリオド</button>
    <button class="blue" onclick="addStamp('4ピリオド')">4ピリオド</button>
    <button class="blue" onclick="addStamp('5ピリオド')">5ピリオド</button>
    <button class="blue" onclick="addStamp('6ピリオド')">6ピリオド</button>

    <button class="purple" onclick="addStamp('ROSC')">ROSC</button>
    <button class="purple" onclick="addStamp('アドレナリン')">アドレナリン</button>
    <button class="purple" onclick="addStamp('デバイス')">デバイス</button>
    <button class="purple" onclick="addStamp('挿管')">挿管</button>

    <button class="red" onclick="addStamp('VF')">VF</button>
    <button class="red" onclick="addStamp('VT')">VT</button>
    <button class="red" onclick="addStamp('PEA')">PEA</button>
    <button class="red" onclick="addStamp('Asystole')">Asystole</button>
  </div>

  <h2>記録</h2>
  <div class="log" id="log"></div>

  <h2>メモ</h2>
  <textarea id="memo" placeholder="活動メモ、特記事項など"></textarea>

  <div class="controls">
    <button class="gray" onclick="downloadCSV()">CSV出力</button>
    <button class="red" onclick="resetLog()">リセット</button>
  </div>

  <script>
    let records = [];

    function getCurrentTime() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      const sec = String(now.getSeconds()).padStart(2, '0');
      return `${yyyy}/${mm}/${dd} ${hh}:${min}:${sec}`;
    }

    function addStamp(label) {
      const time = getCurrentTime();
      records.push({ label, time });
      saveData();
      renderLog();
    }

    function renderLog() {
      const log = document.getElementById('log');
      log.innerHTML = '';

      if (records.length === 0) {
        log.innerHTML = '<p>まだ記録はありません。</p>';
        return;
      }

      records.forEach((record) => {
        const div = document.createElement('div');
        div.className = 'log-item';
        div.innerHTML = `
          <span class="time">${record.time}</span>
          <span>${record.label}</span>
        `;
        log.appendChild(div);
      });
    }

    function saveData() {
      localStorage.setItem('ems_records', JSON.stringify(records));
      localStorage.setItem('ems_memo', document.getElementById('memo').value);
    }

    function loadData() {
      const savedRecords = localStorage.getItem('ems_records');
      const savedMemo = localStorage.getItem('ems_memo');

      if (savedRecords) {
        records = JSON.parse(savedRecords);
      }

      if (savedMemo) {
        document.getElementById('memo').value = savedMemo;
      }

      renderLog();
    }

    function resetLog() {
      if (!confirm('記録をすべて削除しますか？')) return;

      records = [];
      document.getElementById('memo').value = '';
      localStorage.removeItem('ems_records');
      localStorage.removeItem('ems_memo');
      renderLog();
    }

    function downloadCSV() {
      const memo = document.getElementById('memo').value;

      let csv = '項目,時刻\n';

      records.forEach(record => {
        csv += `"${record.label}","${record.time}"\n`;
      });

      csv += '\nメモ\n';
      csv += `"${memo.replace(/"/g, '""')}"\n`;

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = '救急現場タイムスタンプ.csv';
      a.click();

      URL.revokeObjectURL(url);
    }

    document.getElementById('memo').addEventListener('input', saveData);

    loadData();
  </script>
</body>
</html>
